<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app.title">StockMaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="antialiased">
  <div class="flex h-screen overflow-hidden">
    <!-- Main Content (Full Width) -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <!-- Header -->
      <header class="h-20 bg-(--bg-nav) border-b border-(--border-200) flex items-center justify-between px-6 md:px-10 z-10 transition-colors duration-300">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 bg-(--brand) rounded-xl flex items-center justify-center shadow-lg transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-(--text-inverse)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
          </div>
          <div>
            <h1 class="text-2xl font-black text-(--text-primary) tracking-tight leading-none" data-i18n="app.title">StockMaster</h1>
            <p class="text-xs font-bold text-(--brand) uppercase tracking-widest mt-1" data-i18n="app.subtitle">Gestión de Inventario</p>
          </div>
        </div>
        <div class="flex items-center gap-6">
          <div class="relative hidden md:block">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-(--text-muted)">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
            </span>
            <input id="search-bar" type="text" data-i18n-placeholder="app.search_placeholder" placeholder="Buscar en el catálogo..." class="block w-80 pl-10 pr-4 py-2.5 border border-(--border-200) rounded-xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) transition-all text-sm bg-(--bg-input) text-(--text-primary)">
          </div>
          
          <!-- Theme & Lang Controls -->
          <div class="flex items-center gap-3">
            <div class="relative group">
              <select id="theme-selector" class="appearance-none bg-(--bg-input) border border-(--border-200) text-(--text-primary) text-xs font-bold rounded-xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) block px-4 py-2.5 pr-8 transition-all duration-300 group-hover:bg-(--bg-hover) hover:cursor-pointer shadow-sm">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="purple">Purple</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-(--text-muted) group-hover:text-(--text-primary) transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
            
            <div class="relative group">
              <select id="lang-selector" class="appearance-none bg-(--bg-input) border border-(--border-200) text-(--text-primary) text-xs font-bold rounded-xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) block px-4 py-2.5 pr-8 transition-all duration-300 group-hover:bg-(--bg-hover) hover:cursor-pointer shadow-sm">
                <option value="es">🇪🇸 ES</option>
                <option value="en">🇺🇸 EN</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-(--text-muted) group-hover:text-(--text-primary) transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <div class="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
        <div class="max-w-400 mx-auto">
          <!-- Grid Layout -->
          <div class="grid grid-cols-1 xl:grid-cols-12 gap-10">
            
            <!-- Product Form Card -->
            <div class="xl:col-span-3">
              <div class="bg-(--bg-card) rounded-3xl shadow-xl border border-(--border-100) overflow-hidden sticky top-0 transition-colors duration-300">
                <div class="p-8 border-b border-(--border-50) bg-(--bg-input)">
                  <h3 id="form-title" class="text-xl font-bold text-(--text-primary)" data-i18n="form.title_create">Detalles del Producto</h3>
                  <p class="text-sm text-(--text-muted) mt-1 font-medium" data-i18n="form.subtitle">Completa la información del artículo.</p>
                </div>
                <form id="product-form" class="p-8 space-y-6">
                  <div>
                    <label class="block text-sm font-bold text-(--text-secondary) mb-2" data-i18n="form.name">Nombre del Producto</label>
                    <input type="text" id="nombre" name="nombre" required data-i18n-placeholder="form.name_placeholder" placeholder="Ej. Monitor LG 27&quot;" class="w-full px-4 py-3 border border-(--border-200) text-(--text-primary) rounded-2xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) transition-all bg-(--bg-input)">
                  </div>
                  
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-bold text-(--text-secondary) mb-2" data-i18n="form.price">Precio ($)</label>
                      <input type="number" step="0.01" id="precio" name="precio" required placeholder="0.00" class="w-full px-4 py-3 border border-(--border-200) text-(--text-primary) rounded-2xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) transition-all bg-(--bg-input)">
                    </div>
                    <div>
                      <label class="block text-sm font-bold text-(--text-secondary) mb-2" data-i18n="form.stock">Stock Actual</label>
                      <input type="number" id="stock" name="stock" required placeholder="0" class="w-full px-4 py-3 border border-(--border-200) text-(--text-primary) rounded-2xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) transition-all bg-(--bg-input)">
                    </div>
                  </div>

                  <div>
                    <label class="block text-sm font-bold text-(--text-secondary) mb-2" data-i18n="form.description">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="4" data-i18n-placeholder="form.description_placeholder" placeholder="Especificaciones, colores, estado..." class="w-full px-4 py-3 border border-(--border-200) text-(--text-primary) rounded-2xl focus:outline-none focus:ring-4 focus:ring-(--brand)/20 focus:border-(--brand) transition-all resize-none bg-(--bg-input)"></textarea>
                  </div>

                  <div class="pt-2 flex flex-col gap-3">
                    <button type="submit" id="btn-submit" class="w-full bg-(--brand) hover:bg-(--brand-hover) hover:cursor-pointer text-(--text-inverse) font-black py-4 px-4 rounded-2xl shadow-lg transition-all active:scale-[0.98] uppercase tracking-wider text-sm" data-i18n="form.btn_save">
                      Guardar Producto
                    </button>
                    <button type="button" id="btn-cancel" class="w-full px-4 py-3 border border-(--border-200) transition-all duration-300 ease-in-out hover:-translate-y-1 transform text-(--text-muted) font-bold rounded-2xl hover:bg-(--bg-hover) text-xs uppercase tracking-widest" data-i18n="form.btn_clear">
                      Limpiar Formulario
                    </button>
                  </div>
                </form>
              </div>
            </div>

            <!-- Products List -->
            <div class="xl:col-span-9 space-y-8">
              <!-- Summary Cards -->
              <div id="stats" class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <!-- Inyectado con js -->
              </div>

              <!-- Table Container -->
              <div class="bg-(--bg-card) rounded-3xl shadow-xl border border-(--border-100) overflow-hidden transition-colors duration-300">
                <div class="overflow-x-auto">
                  <table class="w-full text-left border-collapse">
                    <thead>
                      <tr class="bg-(--bg-table-header) border-b border-(--border-100)">
                        <th class="px-8 py-5 text-[10px] font-black text-(--text-muted) uppercase tracking-widest" data-i18n="table.product">Producto / Descripción</th>
                        <th class="px-8 py-5 text-[10px] font-black text-(--text-muted) uppercase tracking-widest text-center" data-i18n="table.stock">Existencias</th>
                        <th class="px-8 py-5 text-[10px] font-black text-(--text-muted) uppercase tracking-widest text-center" data-i18n="table.price">Precio Unit.</th>
                        <th class="px-8 py-5 text-[10px] font-black text-(--text-muted) uppercase tracking-widest text-right" data-i18n="table.actions">Acciones</th>
                      </tr>
                    </thead>
                    <tbody id="inventory-list" class="divide-y divide-(--border-50)">
                      <!-- Inyectado con js -->
                    </tbody>
                  </table>
                </div>
                
                <!-- Pagination Footer -->
                <div id="pagination" class="px-8 py-6 border-t border-(--border-50) flex items-center justify-between bg-(--bg-input)">
                  <!-- Inyectado con js -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
